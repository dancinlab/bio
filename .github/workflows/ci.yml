# bio CI — runs `sidecar ci` (verify.checks) on the configured runner.
#
# Generated by `sidecar ci scaffold` (also written by `sidecar init`). The checks are
# the repo's own verify.checks (config-driven) — edit them in harness.config.json, not
# here. Change the runner / stack setup via config `ci.runner` / `ci.setup`, then
# re-scaffold.

name: bio-ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: sidecar ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install hexa toolchain (released binary)
        shell: bash
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/dancinlab/hexa-lang/main/install.sh)"
          echo "$HOME/.hx/bin" >> "$GITHUB_PATH"
      - name: Install sidecar
        shell: bash
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/dancinlab/sidecar/main/scripts/install.sh)"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify — sidecar ci (repo verify.checks)
        run: |
          sidecar ci
      - name: Lint — sidecar lint (advisory in CI)
        run: |
          sidecar lint || true
